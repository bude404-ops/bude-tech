<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudE Tech</title>

<style>
body {margin:0;font-family:Arial;background:#0f1115;color:#fff}
.header{padding:12px;background:#151923;text-align:center}
.chat{height:40vh;overflow:auto;padding:10px}
.msg{margin:5px;padding:10px;border-radius:6px}
.user{background:#2a6df4}
.ai{background:#2a2f3a}
.panel{padding:10px}
button{padding:10px}
input{width:70%;padding:10px}
</style>
</head>

<body>

<div class="header">BudE Tech</div>

<div id="chat" class="chat"></div>

<div class="panel">
<input id="msg">
<button onclick="send()">Send</button>
</div>

<div class="panel">
<button onclick="toggle()">AUTO</button>
</div>

<div class="panel" id="status">Loading...</div>

<script>
const API="http://127.0.0.1:8000";

function add(t,c){
let d=document.createElement("div");
d.className="msg "+c;
d.innerText=t;
document.getElementById("chat").appendChild(d);
}

async function send(){
let m=document.getElementById("msg").value;
add(m,"user");
await fetch(API+"/task/"+m,{method:"POST"});
}

async function toggle(){
await fetch(API+"/auto",{method:"POST"});
}

async function update(){
let s=await fetch(API+"/status").then(r=>r.json());
document.getElementById("status").innerText=
`Tasks:${s.tasks} Completed:${s.completed} Revenue:${s.revenue}`;
}

setInterval(update,2000);
update();
</script>

</body>
</html>
