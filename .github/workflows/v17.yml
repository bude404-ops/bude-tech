name: BudE OS V17

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Brain
        run: python brain.py

      - name: Commit
        run: |
          git config user.name "bude-v17"
          git config user.email "v17@bude.ai"
          git add .
          git commit -m "V17 update" || echo "no changes"
          git push
