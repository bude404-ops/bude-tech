name: BudE CEO Auto-Run

on:
  schedule:
    - cron: '*/15 * * * *'   # Runs every 15 minutes (free tier limit)
  workflow_dispatch:          # Manual trigger button
  push:
    branches: [main]

jobs:
  run-ceo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run BudE CEO
        run: python bude.py

      - name: Commit changes
        run: |
          git config user.name "BudE Bot"
          git config user.email "bot@bude.local"
          git add core/
          git diff --cached --quiet || git commit -m "🧠 BudE cycle $(date -u)"
          git push
