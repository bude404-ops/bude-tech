name: BUDE CEO v26 — Autonomous Build

on:
  schedule:
    - cron: '0 */4 * * *'
    - cron: '30 */4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['ceo.js', '.github/workflows/**']

concurrency:
  group: bude-ceo-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Skip if recently ran
        id: check
        run: |
          LAST_RUN=$(git log -1 --format=%ct --grep="CEO build" || echo "0")
          NOW=$(date +%s)
          DIFF=$((NOW - LAST_RUN))
          if [ "$DIFF" -lt "7200" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Ran ${DIFF}s ago. Skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run CEO
        if: steps.check.outputs.skip != 'true'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          mkdir -p data
          node ceo.js || true

      - name: Commit & push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "CEO BOT"
          git config user.email "bot@bude-tech.io"
          git add -A
          git diff --cached --quiet || git commit -m "🤖 CEO build $(date -u +%H:%M) UTC"
          git push origin main
