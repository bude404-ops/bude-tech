name: BudE Evolution Engine v0.2

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Evolution Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python evolve.py

      - name: Commit changes
        run: |
          git config user.name "bude-ai"
          git config user.email "bude@ai.system"
          git add .
          git diff --cached --quiet || git commit -m "BudE evolution cycle update"
          git push
