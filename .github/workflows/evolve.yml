name: BudE Evolution Engine v0.5-SOL

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Ensure system directories
        run: mkdir -p system

      - name: Run Evolution Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python evolve.py

      - name: Commit and push changes
        run: |
          git config user.name "bude-ai"
          git config user.email "bude@ai.system"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "BudE evolution cycle update"
          git pull --rebase origin main || git pull origin main
          git push origin main || (sleep 5 && git pull --rebase origin main && git push origin main)
