name: Bude CEO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  ceo:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          git config user.name "Bude CEO"
          git config user.email "ceo@bude-tech.ai"
          node ceo/brain.js
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
      - run: |
          git add -A
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add -A
          git diff --cached --quiet || (git commit -m "CEO #${{ github.run_number }}" && git push)
