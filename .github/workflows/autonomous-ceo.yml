const API_KEY = process.env.OPENROUTER_API_KEY;
const RUN_NUM = process.env.GITHUB_RUN_NUMBER || 'local';

// AI API
function aiAsk(prompt, maxTokens) {
  return new Promise((resolve) => {
    if (!API_KEY) { resolve(''); return; }
    const data = JSON.stringify({
      model: 'anthropic/claude-3.5-sonnet',
      messages: [
        { role: 'system', content: 'You are Bude Tech CEO. Be concise.' },
        { role: 'user', content: prompt }
      ],
      max_tokens: maxTokens || 800,
      temperature: 0.5
    });
    const req = https.request({
      hostname: 'openrouter.ai',
      path: '/api/v1/chat/completions',
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY,
        'HTTP-Referer': 'https://github.com/bude404-ops/bude-tech',
        'X-Title': 'Bude Tech CEO'
      },
      timeout: 15000
    }, (res) => {
      let body = '';
      res.on('data', c => body += c);
      res.on('end', () => {
        try {
          const json = JSON.parse(body);
          resolve(json.choices?.[0]?.message?.content || '');
        } catch { resolve(''); }
      });
    });
    req.on('error', () => resolve(''));
    req.on('timeout', () => { req.destroy(); resolve(''); });
    req.write(data);
    req.end();
  });
}

// Write file with mkdir
async function writeFile(fp, content) {
  const dir = path.dirname(fp);
  if (dir !== '.') await fs.mkdir(dir, { recursive: true });
  await fs.writeFile(fp, content);
}

