name: BUDE AI Dev Swarm v28

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  swarm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install || true

      - name: Extract Task
        run: |
          echo "TASK=$(jq -r .issue.title $GITHUB_EVENT_PATH)" >> $GITHUB_ENV

      - name: Run Swarm Engine
        run: node engine/swarm.js "$TASK"

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: "🧠 BUDE AI Dev Swarm v28"
          body: "Multi-agent planning, critique, and repair loop system"
          branch: "swarm-${{ github.run_id }}"
          base: main
