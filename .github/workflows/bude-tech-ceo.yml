#!/usr/bin/env python3
import csv
import json
from datetime import datetime, timedelta

TREASURY_CONFIG = {
    'primary_wallet': 'YOUR_SOLANA_ADDRESS_HERE',
    'backup_wallet': 'YOUR_ETH_ADDRESS_HERE',
    'target_reserve_usd': 1000,
    'reinvest_ratio': 0.70,
    'owner_draw_ratio': 0.20,
    'emergency_ratio': 0.10
}

def initialize_treasury():
    with open('data/treasury.csv', 'w', newline='') as f:
        writer = csv.writer(f)
        writer.writerow(['timestamp', 'sol_balance', 'sol_usd', 'eth_balance', 'eth_usd', 'usdc_balance', 'total_usd', 'tx_hash'])
    with open('finance/treasury-config.json', 'w') as f:
        json.dump(TREASURY_CONFIG, f, indent=2)

def generate_weekly_forecast():
    weeks = []
    base_revenue = 0
    for week in range(1, 13):
        new_customers = max(1, week * 2)
        revenue = new_customers * 29
        weeks.append({
            'week': week,
            'customers': new_customers,
            'revenue_usd': revenue,
            'cumulative': base_revenue + revenue
        })
        base_revenue += revenue
    return weeks

def generate_report(forecast):
    report = f"""# Treasury Report - {datetime.now().strftime('%Y-%m-%d')}\n\n"""
    report += "**CFO:** Priya Sharma\n"
    report += "**Status:** Pre-revenue / Operational\n\n"
    report += "## Current Balances\n"
    report += "| Asset | Amount | USD Equivalent |\n"
    report += "|-------|--------|----------------|\n"
    report += "| SOL | 0 | $0.00 |\n"
    report += "| ETH | 0 | $0.00 |\n"
    report += "| USDC | 0 | $0.00 |\n"
    report += "| **Total** | - | **$0.00** |\n\n"
    report += "## 12-Week Forecast\n\n"
    report += "| Week | New Customers | Revenue | Cumulative |\n"
    report += "|------|---------------|---------|------------|\n"
    for w in forecast[:4]:
        report += f"| {w['week']} | +{w['customers']} | ${w['revenue_usd']} | ${w['cumulative']} |\n"
    report += f"| ... | ... | ... | ... |\n"
    report += f"| 12 | +{forecast[-1]['customers']} | ${forecast[-1]['revenue_usd']} | ${forecast[-1]['cumulative']} |\n\n"
    report += "## Treasury Rules\n"
    report += "- **70%** Reinvest in growth (tools, infrastructure)\n"
    report += "- **20%** Owner draw (your approval required)\n"
    report += "- **10%** Emergency reserve\n\n"
    report += "## Pricing Strategy\n"
    report += "| Plan | Monthly | Annual | Lifetime |\n"
    report += "|------|---------|--------|----------|\n"
    report += "| Starter | Free | - | - |\n"
    report += "| Growth | $29 USDC | $290 USDC | - |\n"
    report += "| Scale | $99 USDC | $990 USDC | - |\n"
    report += "| Lifetime | - | - | $290 USDC |\n\n"
    report += "## Next Milestones\n"
    report += "- [ ] First customer payment\n"
    report += "- [ ] Treasury > $100\n"
    report += "- [ ] Treasury > $1,000\n"
    report += "- [ ] Owner first draw\n\n"
    report += "## Risk Assessment\n"
    report += "Low risk - zero burn rate\n"
    report += "Medium risk - crypto volatility\n"
    report += "Low risk - no debt or liabilities\n"
    return report

if __name__ == '__main__':
    initialize_treasury()
    forecast = generate_weekly_forecast()
    with open('finance/weekly-report.md', 'w') as f:
        f.write(generate_report(forecast))
    with open('finance/forecast.json', 'w') as f:
        json.dump({
            'generated': datetime.now().isoformat(),
            'by': 'Priya Sharma',
            'weeks': forecast,
            'projected_12_week_revenue': sum(w['revenue_usd'] for w in forecast)
        }, f, indent=2)
    print(f"Priya: Treasury initialized. 12-week forecast: ${sum(w['revenue_usd'] for w in forecast)}")
