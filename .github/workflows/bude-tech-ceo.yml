def generate_compliance_report(issues, scanned):
    score = 100
    score -= len([i for i in issues if i['severity'] == 'HIGH']) * 5
    score -= len([i for i in issues if i['severity'] == 'CRITICAL']) * 20
    score = max(0, score)
    report = f"""# Compliance Audit - {datetime.now().strftime('%Y-%m-%d')}

**Auditor:** Alex Rivera, Chief Legal Officer
**Files Scanned:** {scanned}
**Issues Found:** {len(issues)}
**Compliance Score:** {score}/100

## Findings
"""
    if issues:
        for issue in issues:
            emoji = 'CRITICAL' if issue['severity'] == 'CRITICAL' else 'WARNING'
            report += f"{emoji} **{issue['type']}** in `{issue['file']}`: {issue['detail']}\n"
    else:
        report += "No compliance issues found!\n"
    report += f"""

## Status
{"FULLY COMPLIANT" if score >= 95 else "COMPLIANT WITH NOTES" if score >= 80 else "NON-COMPLIANT"}

## Certifications
- [x] No KYC collection
- [x] No fiat processing
- [x] No data retention
- [x] Open source operations
- [x] Transparent decisions
"""
    return report, score

if __name__ == '__main__':
    issues, scanned = scan_repository()
    report, score = generate_compliance_report(issues, scanned)
    with open('legal/scan-results.md', 'w') as f:
        f.write(report)
    with open('legal/terms.md', 'w') as f:
        f.write(generate_terms())
    with open('legal/privacy.md', 'w') as f:
        f.write(generate_privacy())
    with open('legal/compliance-score.json', 'w') as f:
        json.dump({
            'generated': datetime.now().isoformat(),
            'score': score,
            'files_scanned': scanned,
            'issues': len(issues),
            'status': 'COMPLIANT' if score >= 80 else 'NON_COMPLIANT'
        }, f, indent=2)
    print(f"Alex: Scanned {scanned} files. Score: {score}/100. Status: {'COMPLIANT' if score >= 80 else 'NEEDS WORK'}")
