BANNED_SERVICES = [
    'stripe', 'paypal', 'square', 'wise', 'mercury', 'brex',
    'aws', 'heroku', 'digitalocean', 'twilio', 'sendgrid',
    'kyc', 'aml', 'identity verification', 'credit check'
]

BANNED_DATA = [
    'ssn', 'social security', 'passport', 'driver license',
    'date of birth', 'home address', 'phone number'
]

PRIVACY_PATTERNS = [
    r'\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b',
    r'\b\d{3}-\d{2}-\d{4}\b',
    r'\b\d{4}[\s-]?\d{4}[\s-]?\d{4}[\s-]?\d{4}\b'
]

def scan_repository():
    issues = []
    scanned = 0
    for root, dirs, files in os.walk('.'):
        dirs[:] = [d for d in dirs if not d.startswith('.') and d not in ['node_modules', '__pycache__']]
        for file in files:
            if file.endswith(('.md', '.py', '.js', '.html', '.yml', '.yaml', '.json', '.txt')):
                path = os.path.join(root, file)
                try:
                    with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                        content = f.read().lower()
                        scanned += 1
                        for service in BANNED_SERVICES:
                            if service in content:
                                issues.append({'file': path, 'type': 'BANNED_SERVICE', 'detail': service, 'severity': 'HIGH'})
                        for data in BANNED_DATA:
                            if data in content:
                                issues.append({'file': path, 'type': 'DATA_COLLECTION', 'detail': data, 'severity': 'CRITICAL'})
                    with open(path, 'r', encoding='utf-8', errors='ignore') as f2:
                        original = f2.read()
                        for pattern in PRIVACY_PATTERNS:
                            matches = re.findall(pattern, original)
                            for match in matches:
                                issues.append({'file': path, 'type': 'PRIVACY_LEAK', 'detail': match[:10] + '...', 'severity': 'CRITICAL'})
                except: pass
    return issues, scanned

