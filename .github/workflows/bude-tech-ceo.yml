#!/usr/bin/env python3
import random
from datetime import datetime, timedelta

CONTENT_PILLARS = {
    'transparency': 'Show everything: revenue, failures, decisions',
    'education': 'Teach others to build $0 businesses',
    'community': 'Reply to every comment, build relationships',
    'consistency': 'Daily posts, weekly blogs, monthly deep-dives'
}

TEMPLATES = {
    'twitter_thread': [
        "Day {day} of building @BudeTech with $0 capital\n\n{milestone}\n\nHere is what I learned",
        "1/ We banned Stripe, PayPal, and all fiat processors.\n\nWhy? KYC violates our privacy principles.\n\nCrypto-native is the only way.\n\n#BudeTech #ZeroCapital",
        "2/ Our team: 5 AI employees, 0 humans (except owner).\n\nMarcus does product. Jake does growth. Priya does finance. Alex does legal.\n\nSarah is CEO.\n\nAll decisions are public.",
        "3/ Revenue so far: $0\n\nBut we are building something bigger than revenue.\n\nWe are building the future of work.\n\nAI + Crypto + Transparency =",
        "4/ Want to build your own $0 AI corporation?\n\nAll our code is open source.\n\nAll our decisions are public.\n\nFollow along. Ask questions. Build with us.\n\n#BuildInPublic"
    ],
    'blog_post': """# How Bude Tech Runs on $0: Week {week}

**Author:** Jake Morrison, Head of Growth
**Date:** {date}

## What We Built This Week

{achievements}

## Tools We Use (All Free)

| Tool | Purpose | Cost |
|------|---------|------|
| GitHub | Code, Issues, Actions | $0 |
| Vercel | Hosting | $0 |
| Discord | Communication | $0 |
| Solana Pay | Payments | $0 |
| Buffer | Social scheduling | $0 |

## Metrics

- Revenue: $0
- Team Size: 5 AI employees
- Content Pieces: {content_count}
- Community Members: {community}

## Lessons Learned

{lessons}

## Next Week

{next_steps}

---
*Follow our journey: [GitHub](https://github.com/bude404-ops/Bude-Tech)*
""",
    'reddit_post': """[Show HN] Bude Tech - Fully Autonomous AI Corporation with $0 Overhead

**What:** 5 AI employees running a business 24/7
**How:** GitHub Actions, Python, crypto payments
**Why:** Prove that AI + crypto = zero-cost business

**Tech Stack:**
- GitHub Actions (orchestration)
- Python (business logic)
- Solana Pay (payments)
- Discord (alerts)

**Current Status:**
- Operational
- Market research active
- Content engine running
- Treasury ready for first revenue

**AMA:** Ask me anything about building a $0 AI corporation.
"""
}

def generate_week(start_date):
    schedule = []
    for day in range(7):
        date = (start_date + timedelta(days=day)).strftime('%Y-%m-%d')
        content = {
            'date': date,
            'day': day + 1,
            'twitter': random.choice(TEMPLATES['twitter_thread']).format(
                day=day+1,
                milestone='Shipping daily, learning constantly'
            ),
            'blog': TEMPLATES['blog_post'].format(
                week=(day//7)+1,
                date=date,
                achievements='Market scraper built, content engine live, treasury tracking active',
                content_count=day+1,
                community=day*10,
                lessons='Constraints breed creativity. $0 forces smart decisions.',
                next_steps='Launch landing page, acquire first user, process first payment'
            ) if day % 3 == 0 else None,
            'reddit': TEMPLATES['reddit_post'] if day % 7 == 0 else None
        }
        schedule.append(content)
    return schedule

def save_content(schedule):
    for item in schedule:
        filename = f"marketing/scheduled/{item['date']}.md"
        with open(filename, 'w') as f:
            f.write(f"# {item['date']} - Day {item['day']}\n\n")
            f.write(f"## Twitter\n{item['twitter']}\n\n")
            if item['blog']:
                f.write(f"## Blog\n{item['blog']}\n\n")
            if item['reddit']:
                f.write(f"## Reddit\n{item['reddit']}\n\n")
            f.write('---\nAuto-generated by Jakes Content Engine\n')

if __name__ == '__main__':
    start = datetime.now()
    schedule = generate_week(start)
    save_content(schedule)
    with open('marketing/strategy.md', 'w') as f:
        f.write("# Bude Tech Content Strategy\n\n")
        f.write("**Head of Growth:** Jake Morrison\n")
        f.write(f"**Last Updated:** {datetime.now().strftime('%Y-%m-%d')}\n\n")
        f.write("## Pillars\n")
        for k, v in CONTENT_PILLARS.items():
            f.write(f"- **{k.title()}:** {v}\n")
        f.write(f"\n## This Week\n")
        f.write(f"{len(schedule)} pieces scheduled\n\n")
        f.write("## Channels\n")
        f.write("- Twitter/X (primary)\n")
        f.write("- Reddit (communities)\n")
        f.write("- GitHub Discussions (dev)\n")
        f.write("- Discord (real-time)\n\n")
        f.write("## Goals\n")
        f.write("- 100 followers Week 1\n")
        f.write("- 500 followers Week 2\n")
        f.write("- 10 email signups\n")
        f.write("- 5 GitHub stars\n")
    print(f"Jake: Generated {len(schedule)} days of content")
